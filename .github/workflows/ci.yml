name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build-ubuntu:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: [18, 20, 22, 23, 24, 25]
    steps:
       - uses: actions/checkout@v6
       - name: Use Node.js ${{ matrix.node-version }}
         uses: actions/setup-node@v6
         with:
           node-version: ${{ matrix.node-version }}
           cache: yarn
       - run: yarn install --immutable
       - run: yarn build
       - name: Test
         env:
           GIT_AUTHOR_NAME: Simple Git Tests
           GIT_AUTHOR_EMAIL: tests@simple-git.dev
         run: yarn test

  build-windows:
    runs-on: windows-2025
    steps:
       - uses: actions/checkout@v6
       - name: Use Node.js 24
         uses: actions/setup-node@v6
         with:
           node-version: 24
           cache: yarn
       - run: yarn install --immutable
       - run: yarn build
       - name: Test
         env:
           GIT_AUTHOR_NAME: Simple Git Tests
           GIT_AUTHOR_EMAIL: tests@simple-git.dev
         run: yarn test:win
